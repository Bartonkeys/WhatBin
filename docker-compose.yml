version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: whatbin-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatbin}
      POSTGRES_USER: ${POSTGRES_USER:-whatbin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - whatbin-pgdata:/var/lib/postgresql/data
    networks:
      - whatbin-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: whatbin-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    networks:
      - whatbin-net

networks:
  whatbin-net:

volumes:
  whatbin-pgdata: